name: PHPUnit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
        wp: ['6.0', '6.5', 'latest']
        exclude:
          - php: '8.3'
            wp: '6.0'

    services:
      mysql:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, intl
          tools: composer:v2
          coverage: none

      - name: Install Composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Subversion (for WP test installer)
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite (WP ${{ matrix.wp }})
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always
