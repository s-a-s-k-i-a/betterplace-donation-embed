name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps (wp-env)
        run: npm install

      - name: Install Playwright deps
        run: |
          cd tests/e2e
          npm install
          npx playwright install --with-deps chromium

      - name: Start wp-env
        run: npx wp-env start --update

      - name: Wait for WordPress
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8888/wp-login.php > /dev/null && exit 0
            sleep 2
          done
          echo "WordPress did not respond on :8888" && exit 1

      - name: Activate plugin
        run: npx wp-env run cli wp plugin activate betterplace-donation-embed

      - name: Run smoke test
        run: bash tests/smoke/smoke.sh

      - name: Run Playwright E2E
        env:
          WP_BASE_URL: http://localhost:8888
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: password
        run: |
          cd tests/e2e
          npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 14

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop || true
